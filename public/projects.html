<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F0FAF6">
  <title>プロジェクト - Project OS</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/icon-pia.png">
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <div class="app-wrapper">
    <div style="padding:16px;">
      <h2 style="margin-bottom:12px;">📁 プロジェクト</h2>

      <!-- ステータスフィルタ -->
      <div class="status-filter">
        <button class="filter-btn active" data-status="active" onclick="filterProjects('active', this)">進行中</button>
        <button class="filter-btn" data-status="done" onclick="filterProjects('done', this)">完了</button>
        <button class="filter-btn" data-status="paused" onclick="filterProjects('paused', this)">休止</button>
        <button class="filter-btn" data-status="" onclick="filterProjects('', this)">すべて</button>
      </div>

      <!-- プロジェクトリスト -->
      <div id="projectList" style="display:flex;flex-direction:column;gap:12px;">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- 新規作成FAB -->
  <button class="fab" onclick="openModal('createModal')" title="新規プロジェクト">+</button>

  <!-- 新規作成モーダル -->
  <div class="modal-overlay" id="createModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>新規プロジェクト</h2>
        <button class="modal-close" onclick="closeModal('createModal')">&times;</button>
      </div>

      <div class="form-group">
        <label>タイプ</label>
        <div class="type-toggle">
          <button class="type-btn selected" data-type="project" onclick="selectType('project')">🔨 つくる</button>
          <button class="type-btn" data-type="study" onclick="selectType('study')">📖 まなぶ</button>
        </div>
      </div>

      <div class="form-group">
        <label>プロジェクト名 *</label>
        <input type="text" id="createName" placeholder="例: スマホアプリを作りたい">
      </div>

      <div class="form-group">
        <label>説明</label>
        <textarea id="createDesc" rows="3" placeholder="何をしたいか、ざっくり書いてね"></textarea>
      </div>

      <div class="form-group">
        <label>目標日</label>
        <input type="date" id="createGoalDate">
      </div>

      <div class="form-group" id="dailyMinutesGroup" style="display:none;">
        <label>1日の学習時間（分）</label>
        <input type="number" id="createDailyMinutes" placeholder="30" min="1">
      </div>

      <div class="form-group">
        <label>GitHubリポジトリ（任意）</label>
        <input type="text" id="createGithubRepo" placeholder="owner/repo">
      </div>

      <div class="form-group">
        <label>カラー</label>
        <div class="color-options" id="colorOptions"></div>
      </div>

      <button class="btn btn-primary" style="width:100%;margin-top:8px;" onclick="createProject()">作成する</button>
    </div>
  </div>

  <!-- AI提案確認モーダル -->
  <div class="modal-overlay" id="aiSuggestModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>AIにタスクを提案してもらう？</h2>
        <button class="modal-close" onclick="closeModal('aiSuggestModal')">&times;</button>
      </div>
      <p style="font-size:14px;color:var(--text-sub);margin-bottom:16px;">ピアちゃんがプロジェクトに合ったタスクを提案するよ！</p>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" style="flex:1;" onclick="goToProjectWithAI()">提案してもらう</button>
        <button class="btn btn-ghost" style="flex:1;" onclick="goToProject()">あとで</button>
      </div>
    </div>
  </div>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <div class="tab-bar-inner">
      <a href="/" class="tab-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>ホーム</span>
      </a>
      <a href="/projects.html" class="tab-item active">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        <span>プロジェクト</span>
      </a>
      <a href="/gantt.html" class="tab-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M13 8h4"/><path d="M13 12h2"/><path d="M13 16h5"/></svg>
        <span>ガント</span>
      </a>
      <a href="/settings.html" class="tab-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        <span>設定</span>
      </a>
    </div>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="/app.js"></script>
  <script src="/projects.js"></script>
</body>
</html>
