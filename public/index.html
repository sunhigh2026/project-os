<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F0FAF6">
  <title>Project OS</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/icon-pia-idea.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-pia-idea.png">
</head>
<body>
  <div class="app-wrapper">
    <!-- ピアちゃんアドバイス -->
    <div id="piaAdvice" class="card section" style="margin:16px 16px 0;">
      <div class="pia-comment">
        <img id="piaIcon" src="/pia-normal.png" alt="ピアちゃん" class="pia-icon-sm" onerror="this.src='/icon-pia.png'">
        <div class="pia-bubble" id="piaBubble">読み込み中...</div>
      </div>
    </div>

    <!-- プロジェクト一覧 -->
    <div class="section" style="padding:0 16px;">
      <div class="section-header" style="padding:16px 0 8px;">
        <span class="section-title">📁 プロジェクト</span>
      </div>
      <!-- 学習ストリーク（まなぶタブ時のみ表示） -->
      <div id="streakSection" style="display:none;margin-bottom:12px;"></div>
      <!-- タイプタブ（まなぶ / つくる） -->
      <div class="dash-type-tabs" id="typeTabs">
        <button class="dash-type-tab active" data-type="project" onclick="switchTypeTab('project', this)">🔨 つくる</button>
        <button class="dash-type-tab" data-type="study" onclick="switchTypeTab('study', this)">📖 まなぶ</button>
      </div>
      <!-- ステータスサブタブ -->
      <div class="dash-status-tabs" id="statusTabs">
        <button class="dash-status-tab active" data-status="active" onclick="switchStatusTab('active', this)">進行中</button>
        <button class="dash-status-tab" data-status="planning" onclick="switchStatusTab('planning', this)">計画中</button>
        <button class="dash-status-tab" data-status="paused" onclick="switchStatusTab('paused', this)">休止</button>
        <button class="dash-status-tab" data-status="done" onclick="switchStatusTab('done', this)">完了</button>
      </div>
      <div id="projectProgress" style="display:flex;flex-direction:column;gap:10px;min-height:60px;">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- 今日やること -->
    <div class="section" style="padding:0 16px;">
      <div class="section-header" style="padding:16px 0 8px;">
        <span class="section-title">📋 今日やること</span>
        <span class="section-count" id="todayTaskCount"></span>
      </div>
      <div id="todayTasks">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- ダイジェスト -->
    <div id="digestCard" style="display:none;padding:0 16px 16px;"></div>
  </div>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <div class="tab-bar-inner">
      <a href="/" class="tab-item active">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>ホーム</span>
      </a>
      <a href="/projects" class="tab-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        <span>プロジェクト</span>
      </a>
      <a href="/gantt" class="tab-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M13 8h4"/><path d="M13 12h2"/><path d="M13 16h5"/></svg>
        <span>ガント</span>
      </a>
      <a href="/settings" class="tab-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        <span>設定</span>
      </a>
    </div>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="/app.js"></script>
  <script src="/dashboard.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
