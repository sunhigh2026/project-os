<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - Project OS</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="theme-color" content="#F5FBF8">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg, #F5FBF8); }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      margin: 0 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .login-title { font-size: 22px; font-weight: 700; text-align: center; color: var(--text-main, #1a1a1a); }
    .login-sub { font-size: 13px; color: var(--muted, #888); text-align: center; margin-top: -8px; }
    .login-input {
      border: 1.5px solid var(--border, #e0e0e0);
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 15px;
      width: 100%;
      box-sizing: border-box;
      outline: none;
      background: #fafafa;
    }
    .login-input:focus { border-color: var(--accent, #4a90e2); background: #fff; }
    .login-btn {
      background: var(--accent, #4a90e2);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }
    .login-btn:hover { opacity: 0.88; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error { color: #e53935; font-size: 13px; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-title">🔐 Project OS</div>
    <div class="login-sub">認証キーを入力してください</div>
    <input type="password" id="keyInput" class="login-input" placeholder="認証キー" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" onclick="login()">ログイン</button>
    <div class="login-error" id="errorMsg">認証キーが正しくありません</div>
  </div>

  <script>
    document.getElementById('keyInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('keyInput').focus();
    });

    async function login() {
      const key = document.getElementById('keyInput').value.trim();
      if (!key) return;

      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = '認証中...';
      document.getElementById('errorMsg').style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key }),
        });
        if (res.ok) {
          const params = new URLSearchParams(location.search);
          const from = params.get('from') || '/';
          const safePath = (from.startsWith('/') && !from.startsWith('//')) ? from : '/';
          window.location.href = safePath;
        } else {
          document.getElementById('errorMsg').style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'ログイン';
        }
      } catch {
        document.getElementById('errorMsg').style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'ログイン';
      }
    }
  </script>
</body>
</html>
