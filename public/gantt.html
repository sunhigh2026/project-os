<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F0FAF6">
  <title>ガントチャート - Project OS</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/icon-pia-glasses.png">
  <link rel="manifest" href="/manifest.json">
  <style>
    .gantt-container {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 16px 16px;
    }
    .gantt-table {
      display: grid;
      min-width: 600px;
      font-size: 12px;
    }
    .gantt-header-row {
      display: contents;
    }
    .gantt-date-cell {
      text-align: center;
      padding: 4px 0;
      font-size: 10px;
      color: var(--text-sub);
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .gantt-date-cell.weekend { background: rgba(126,200,176,0.06); }
    .gantt-date-cell.today { background: rgba(252,165,165,0.12); }
    .gantt-task-name {
      padding: 8px 6px;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .gantt-row {
      display: contents;
    }
    .gantt-cell {
      position: relative;
      height: 32px;
      border-bottom: 1px solid var(--border);
    }
    .gantt-bar {
      position: absolute;
      top: 6px;
      height: 20px;
      border-radius: 4px;
      min-width: 4px;
    }
    .gantt-bar.open { background: #D1D5DB; }
    .gantt-bar.doing { background: var(--primary); }
    .gantt-bar.done { background: var(--primary); opacity: 0.4; }
    .gantt-milestone {
      position: absolute;
      top: 4px;
      width: 14px;
      height: 14px;
      transform: rotate(45deg);
      background: var(--accent-pink);
    }
    .gantt-today-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--accent-red);
      z-index: 5;
      pointer-events: none;
    }
    .gantt-goal-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--accent-pink);
      z-index: 5;
      pointer-events: none;
    }
    .gantt-commit-dot {
      position: absolute;
      top: 2px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #8B5CF6;
      z-index: 4;
    }
    .gantt-phase-header {
      grid-column: 1 / -1;
      padding: 8px 6px 4px;
      font-size: 12px;
      font-weight: 700;
      color: var(--primary-dark);
      background: var(--primary-light);
      border-bottom: 1px solid var(--border);
    }
    .view-toggle {
      display: flex;
      gap: 6px;
      padding: 12px 16px;
    }
    .view-btn {
      padding: 4px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      font-size: 12px;
      cursor: pointer;
    }
    .view-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div style="padding:16px 16px 0;">
      <h2 style="margin-bottom:8px;">📊 ガントチャート</h2>
      <div style="margin-bottom:8px;">
        <select id="projectSelect" onchange="loadGantt()" style="font-size:14px;">
          <option value="all">すべてのプロジェクト</option>
        </select>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" data-view="week" onclick="setView('week', this)">週</button>
        <button class="view-btn" data-view="month" onclick="setView('month', this)">月</button>
      </div>
    </div>

    <div class="gantt-container" id="ganttContainer">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <div class="tab-bar-inner">
      <a href="/" class="tab-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>ホーム</span>
      </a>
      <a href="/projects" class="tab-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        <span>プロジェクト</span>
      </a>
      <a href="/gantt" class="tab-item active">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M13 8h4"/><path d="M13 12h2"/><path d="M13 16h5"/></svg>
        <span>ガント</span>
      </a>
      <a href="/settings" class="tab-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        <span>設定</span>
      </a>
    </div>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="/app.js"></script>
  <script src="/gantt.js"></script>
</body>
</html>
