<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F0FAF6">
  <title>プロジェクト詳細 - Project OS</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/icon-pia-idea.png">
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <div class="app-wrapper">
    <!-- ヘッダー -->
    <div class="card section" style="margin:16px;position:relative;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <a href="/projects" style="text-decoration:none;font-size:20px;color:var(--text-sub);">←</a>
        <span id="projectTypeIcon" class="project-type-icon"></span>
        <h2 id="projectName" style="flex:1;font-size:18px;"></h2>
        <button class="btn btn-sm btn-ghost" onclick="openEditProject()">✏️</button>
      </div>
      <div id="projectDesc" style="font-size:13px;color:var(--text-sub);margin-bottom:10px;display:none;"></div>
      <div id="projectTags" style="margin-bottom:8px;display:none;"></div>
      <div class="progress-bar" style="margin-bottom:6px;">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div id="projectMeta" class="project-meta"></div>
    </div>

    <!-- AIアクションボタン -->
    <div class="ai-actions" style="padding:0 16px;" id="aiActions">
      <button class="ai-btn" onclick="suggestTasks()">🐷 タスクを提案して</button>
      <button class="ai-btn" onclick="scheduleProject()">📅 スケジュールを組んで</button>
      <button class="ai-btn" onclick="openSubdivideSelect()">✂️ タスクを分解</button>
      <button class="ai-btn" id="githubCheckBtn" style="display:none;" onclick="githubCheck()">🔗 GitHub照合</button>
      <button class="ai-btn" onclick="reviewProject()">📝 ふりかえり</button>
    </div>

    <!-- タブ切り替え -->
    <div style="padding:0 16px;">
      <div class="detail-tabs" style="display:flex;gap:8px;margin-top:12px;">
        <button class="filter-btn active" id="tabTasks" onclick="switchTab('tasks')">📋 タスク</button>
        <button class="filter-btn" id="tabNotes" onclick="switchTab('notes')">📝 ノート</button>
      </div>
    </div>

    <!-- タスクビュー -->
    <div id="taskView" style="padding:0 16px;">
      <!-- タスクフィルタ -->
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 0;">
        <button class="filter-btn task-filter-btn active" onclick="filterTasks('all', this)">すべて</button>
        <button class="filter-btn task-filter-btn" onclick="filterTasks('open', this)">未完了</button>
        <button class="filter-btn task-filter-btn" onclick="filterTasks('review', this)">🔄 要復習</button>
        <button class="filter-btn task-filter-btn" onclick="filterTasks('done', this)">完了</button>
      </div>
      <!-- やること -->
      <div class="section-header" style="padding:16px 0 8px;">
        <span class="section-title">📋 やること</span>
        <span class="section-count" id="openCount"></span>
      </div>
      <div id="openTasks"></div>

      <!-- 作業中 -->
      <div class="section-header" style="padding:16px 0 8px;">
        <span class="section-title">🔧 作業中</span>
        <span class="section-count" id="doingCount"></span>
      </div>
      <div id="doingTasks"></div>

      <!-- 完了 -->
      <div class="section-header" style="padding:16px 0 8px;">
        <span class="section-title">✅ 完了</span>
        <span class="section-count" id="doneCount"></span>
      </div>
      <div id="doneTasks"></div>
    </div>

    <!-- ノートビュー -->
    <div id="noteView" style="display:none;padding:0 16px;">
      <!-- ノートフィルタ -->
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin:12px 0;">
        <button class="filter-btn active" onclick="filterNotes('all', this)">すべて</button>
        <button class="filter-btn" onclick="filterNotes('idea', this)">💡 アイデア</button>
        <button class="filter-btn" onclick="filterNotes('link', this)">🔗 リンク</button>
        <button class="filter-btn" onclick="filterNotes('spec', this)">📄 仕様書</button>
      </div>
      <div id="noteList"></div>
      <button class="btn btn-secondary" style="width:100%;margin-top:12px;" onclick="openAddNote()">+ ノートを追加</button>
    </div>

    <!-- ストップウォッチ (studyタイプ時のみ表示) -->
    <div id="stopwatchSection" style="display:none;padding:0 16px;">
      <div class="card" style="padding:16px;text-align:center;" id="stopwatchContent">
        <div id="stopwatchDisplay">
          <div id="stopwatchTime" style="font-size:28px;font-weight:700;color:var(--primary-dark);margin-bottom:4px;">⏱ 00:00:00</div>
          <div id="stopwatchStatus" style="font-size:12px;color:var(--text-sub);margin-bottom:12px;"></div>
        </div>
        <div id="stopwatchTodaySummary" style="font-size:13px;color:var(--text-sub);margin-bottom:12px;"></div>
        <!-- タグ選択 -->
        <div id="stopwatchTagArea" style="margin-bottom:12px;">
          <div style="display:flex;align-items:center;gap:8px;justify-content:center;">
            <span style="font-size:12px;color:var(--text-sub);">タグ:</span>
            <select id="stopwatchTagSelect" style="font-size:13px;padding:4px 8px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);">
              <option value="">なし</option>
            </select>
            <button class="btn btn-ghost btn-sm" onclick="promptNewTag()" style="font-size:11px;padding:2px 8px;">+ 新規</button>
          </div>
        </div>
        <button class="btn btn-primary" id="stopwatchBtn" onclick="toggleStopwatch()" style="min-width:140px;">▶ スタート</button>
      </div>
    </div>

    <!-- 学習時間セクション (studyタイプ時のみ表示) -->
    <div id="studyTimeSection" style="display:none;padding:0 16px;">
      <div class="section-header" style="padding:16px 0 8px;">
        <span class="section-title">📊 学習記録</span>
      </div>
      <div class="card" style="padding:16px;" id="studyTimeContent"></div>
    </div>

    <!-- GitHub セクション -->
    <div id="githubSection" style="display:none;padding:0 16px 16px;">
      <div class="section-header" style="padding:16px 0 8px;">
        <span class="section-title">🐙 GitHub</span>
      </div>
      <div class="github-section" id="githubContent"></div>
    </div>

    <!-- 下部余白（クイック追加分） -->
    <div style="height:80px;"></div>
  </div>

  <!-- クイック追加 -->
  <div class="quick-add">
    <div class="quick-add-inner">
      <input type="text" id="quickAddInput" placeholder="タスクを追加..." onkeydown="if(event.key==='Enter')quickAddTask()">
      <button class="btn btn-ghost btn-sm" onclick="openModal('bulkAddModal')" title="まとめて追加" style="font-size:16px;padding:4px 8px;">📋</button>
      <button class="btn btn-primary btn-sm" onclick="quickAddTask()">追加</button>
    </div>
  </div>

  <!-- タブバーなし（詳細画面なので） -->

  <!-- タスク編集モーダル -->
  <div class="modal-overlay" id="editTaskModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>タスク編集</h2>
        <button class="modal-close" onclick="closeModal('editTaskModal')">&times;</button>
      </div>
      <input type="hidden" id="editTaskId">
      <div class="form-group">
        <label>タスク名</label>
        <input type="text" id="editTaskText">
      </div>
      <div class="form-group">
        <label>優先度</label>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-sm edit-priority" data-p="high" onclick="selectEditPriority('high')">🔴 高</button>
          <button class="btn btn-sm edit-priority" data-p="mid" onclick="selectEditPriority('mid')">🟡 中</button>
          <button class="btn btn-sm edit-priority" data-p="low" onclick="selectEditPriority('low')">⚪ 低</button>
        </div>
      </div>
      <div class="form-group">
        <label>フェーズ</label>
        <input type="text" id="editTaskPhase" placeholder="例: フェーズ1: 企画">
      </div>
      <div class="form-group">
        <label>開始日</label>
        <input type="date" id="editTaskDueStart">
      </div>
      <div class="form-group">
        <label>終了日</label>
        <input type="date" id="editTaskDueEnd">
      </div>
      <div class="form-group" id="editScoreGroup" style="display:none;">
        <label>スコア</label>
        <input type="number" id="editTaskScore" placeholder="点数">
      </div>
      <div class="form-group">
        <label>メモ</label>
        <textarea id="editTaskMemo" rows="3" placeholder="メモ、参考リンク、ハマったことなど"></textarea>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button class="btn btn-primary" style="flex:1;" onclick="saveTask()">保存</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTask()">削除</button>
      </div>
    </div>
  </div>

  <!-- プロジェクト編集モーダル -->
  <div class="modal-overlay" id="editProjectModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>プロジェクト編集</h2>
        <button class="modal-close" onclick="closeModal('editProjectModal')">&times;</button>
      </div>
      <div class="form-group">
        <label>プロジェクト名</label>
        <input type="text" id="editProjectName">
      </div>
      <div class="form-group">
        <label>説明</label>
        <textarea id="editProjectDesc" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>目標日</label>
        <input type="date" id="editProjectGoalDate">
      </div>
      <div class="form-group">
        <label>GitHubリポジトリ</label>
        <input type="text" id="editProjectGithub" placeholder="owner/repo">
      </div>
      <div class="form-group">
        <label>タグ</label>
        <div class="tag-input-container" id="editTagContainer" onclick="document.getElementById('editTagInput').focus()">
          <input type="text" id="editTagInput" placeholder="タグを入力..." onkeydown="handleEditTagKeydown(event)" oninput="showEditTagSuggestions()">
        </div>
        <div class="tag-suggestions" id="editTagSuggestions" style="display:none;"></div>
      </div>
      <div class="form-group" id="editGoalHoursGroup" style="display:none;">
        <label>目標総学習時間（時間）</label>
        <input type="number" id="editTotalGoalHours" placeholder="例: 500" min="1">
      </div>
      <div class="form-group">
        <label>ステータス</label>
        <select id="editProjectStatus">
          <option value="planning">計画中</option>
          <option value="active">進行中</option>
          <option value="paused">休止</option>
          <option value="done">完了</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button class="btn btn-primary" style="flex:1;" onclick="saveProject()">保存</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProject()">削除</button>
      </div>
    </div>
  </div>

  <!-- AI提案モーダル -->
  <div class="modal-overlay" id="suggestModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>🐷 ピアちゃんの提案</h2>
        <button class="modal-close" onclick="closeModal('suggestModal')">&times;</button>
      </div>
      <div id="suggestPiaComment" class="pia-comment" style="margin-bottom:16px;">
        <img src="/pia-happy.png" alt="ピアちゃん" class="pia-icon-sm" onerror="this.src='/icon-pia.png'">
        <div class="pia-bubble" id="suggestComment"></div>
      </div>
      <div id="suggestList"></div>
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button class="btn btn-primary" style="flex:1;" onclick="addSuggestedTasks()">チェックしたタスクを追加</button>
      </div>
    </div>
  </div>

  <!-- AI結果モーダル -->
  <div class="modal-overlay" id="aiResultModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="aiResultTitle">🐷 ピアちゃん</h2>
        <button class="modal-close" onclick="closeModal('aiResultModal')">&times;</button>
      </div>
      <div class="pia-comment" style="margin-bottom:16px;">
        <img src="/pia-happy.png" alt="ピアちゃん" class="pia-icon-sm" onerror="this.src='/icon-pia.png'">
        <div class="pia-bubble" id="aiResultContent"></div>
      </div>
      <div id="aiResultExtra"></div>
    </div>
  </div>

  <!-- タスク選択モーダル（分解用） -->
  <div class="modal-overlay" id="subdivideSelectModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>✂️ 分解するタスクを選択</h2>
        <button class="modal-close" onclick="closeModal('subdivideSelectModal')">&times;</button>
      </div>
      <div id="subdivideTaskList"></div>
    </div>
  </div>

  <!-- ノート追加モーダル -->
  <div class="modal-overlay" id="addNoteModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>ノート追加</h2>
        <button class="modal-close" onclick="closeModal('addNoteModal')">&times;</button>
      </div>
      <div class="form-group">
        <label>タイプ</label>
        <select id="noteType" onchange="onNoteTypeChange()">
          <option value="memo">📝 メモ</option>
          <option value="idea">💡 アイデア</option>
          <option value="link">🔗 リンク</option>
          <option value="spec">📄 仕様書</option>
        </select>
      </div>
      <div class="form-group">
        <label>タイトル</label>
        <input type="text" id="noteTitle" placeholder="タイトル">
      </div>
      <div class="form-group" id="noteContentGroup">
        <label id="noteContentLabel">内容</label>
        <textarea id="noteContent" rows="4" placeholder="自由にメモしてね"></textarea>
      </div>
      <div class="form-group" id="noteUrlGroup" style="display:none;">
        <label>URL</label>
        <input type="url" id="noteUrl" placeholder="https:// or obsidian://open?vault=...">
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:8px;" onclick="saveNote()">追加</button>
    </div>
  </div>

  <!-- ふりかえり生成確認モーダル -->
  <div class="modal-overlay" id="reviewConfirmModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>🎉 プロジェクト完了！</h2>
        <button class="modal-close" onclick="closeModal('reviewConfirmModal')">&times;</button>
      </div>
      <div class="pia-comment" style="margin-bottom:16px;">
        <img src="/pia-happy.png" alt="ピアちゃん" class="pia-icon-sm" onerror="this.src='/icon-pia.png'">
        <div class="pia-bubble">おつかれさま〜！ふりかえりを作成する？✨</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" style="flex:1;" onclick="generateReview()">作成する</button>
        <button class="btn btn-ghost" style="flex:1;" onclick="closeModal('reviewConfirmModal')">あとで</button>
      </div>
    </div>
  </div>

  <!-- まとめて追加モーダル -->
  <div class="modal-overlay" id="bulkAddModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📋 まとめて追加</h2>
        <button class="modal-close" onclick="closeModal('bulkAddModal')">&times;</button>
      </div>
      <p style="font-size:13px;color:var(--text-sub);margin-bottom:12px;">1行に1タスクで入力してね。改行で区切るよ。</p>
      <div class="form-group">
        <textarea id="bulkAddText" rows="10" placeholder="第1章 財務諸表の基礎&#10;第2章 損益計算書&#10;第3章 貸借対照表&#10;..."></textarea>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" style="flex:1;" onclick="aiBulkGenerate()">🐷 AIで生成</button>
        <button class="btn btn-primary" style="flex:1;" onclick="submitBulkAdd()">追加</button>
      </div>
      <div id="bulkAddAiPrompt" style="display:none;margin-top:12px;">
        <div class="form-group">
          <input type="text" id="bulkAiInput" placeholder="例: 財務諸表論の参考書、全15章" onkeydown="if(event.key==='Enter')runAiBulkGenerate()">
        </div>
        <button class="btn btn-primary btn-sm" style="width:100%;" onclick="runAiBulkGenerate()">生成する</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/app.js"></script>
  <script src="/project-detail.js"></script>
</body>
</html>
